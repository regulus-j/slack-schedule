name: Cloud SQL Restore Test

on:
  workflow_dispatch:
    inputs:
      backup_id:
        required: true
      restore_instance:
        required: true
        description: Dedicated staging restore-test instance
      confirm:
        required: true
        description: Type RESTORE-STAGING

permissions:
  contents: read
  id-token: write

jobs:
  restore:
    if: inputs.confirm == 'RESTORE-STAGING'
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud sql backups restore "${{ inputs.backup_id }}" \
            --restore-instance="${{ inputs.restore_instance }}" \
            --backup-instance="${{ vars.GCP_SQL_INSTANCE }}" \
            --quiet
          gcloud sql operations wait \
            "$(gcloud sql operations list --instance="${{ inputs.restore_instance }}" --limit=1 --format='value(name)')" \
            --timeout=1800
