version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production-security:
        dependency-type: production
        update-types:
          - patch
          - minor
  - package-ecosystem: terraform
    directory: /infra/terraform
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
