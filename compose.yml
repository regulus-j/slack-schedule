services:
  app:
    build: .
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - runtime-data:/app/data/runtime
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    build: .
    command: ["npm", "run", "migrate"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    volumes:
      - runtime-data:/app/data/runtime
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: opg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: opg
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2.8
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_HOST: ${CADDY_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  runtime-data:
  caddy-data:
  caddy-config:
